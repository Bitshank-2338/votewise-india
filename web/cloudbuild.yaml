# Google Cloud Build pipeline for VoteWise India.
# Builds a container image and deploys it to Google Cloud Run in us-central1.
#
# Trigger this from the Cloud Build console (push-to-branch trigger) or run
# locally:
#   gcloud builds submit --config=cloudbuild.yaml
#
# Required substitutions (defaults shown):
#   _SERVICE   — Cloud Run service name (default: votewise-india)
#   _REGION    — Cloud Run region       (default: us-central1)
#   _AR_REPO   — Artifact Registry repo  (default: votewise)

substitutions:
  _SERVICE: votewise-india
  _REGION: us-central1
  _AR_REPO: votewise

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # 1. Build the Docker image.
  - name: gcr.io/cloud-builders/docker
    id: Build
    args:
      - build
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$SHORT_SHA"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest"
      - "."

  # 2. Push the image to Google Artifact Registry.
  - name: gcr.io/cloud-builders/docker
    id: Push
    args:
      - push
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}"

  # 3. Deploy the new revision to Cloud Run.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: Deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE}"
      - "--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$SHORT_SHA"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--cpu=1"
      - "--memory=512Mi"
      - "--min-instances=0"
      - "--max-instances=5"
      - "--set-env-vars=NODE_ENV=production"

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$SHORT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest"
